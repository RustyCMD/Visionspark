name: Flutter CI

on:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

defaults:
  run:
    working-directory: visionspark

jobs:
  analyze:
    name: Analyze and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Write placeholder .env
        run: |
          if [ -n "${{ secrets.SUPABASE_URL }}" ] && [ -n "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            printf "SUPABASE_URL=%s\nSUPABASE_ANON_KEY=%s\n" \
              "${{ secrets.SUPABASE_URL }}" \
              "${{ secrets.SUPABASE_ANON_KEY }}" > .env
          else
            printf "SUPABASE_URL=https://placeholder.supabase.co\nSUPABASE_ANON_KEY=placeholder-anon-key\n" > .env
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test --no-pub
        continue-on-error: true

  build-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Write .env
        run: |
          if [ -n "${{ secrets.SUPABASE_URL }}" ] && [ -n "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            printf "SUPABASE_URL=%s\nSUPABASE_ANON_KEY=%s\n" \
              "${{ secrets.SUPABASE_URL }}" \
              "${{ secrets.SUPABASE_ANON_KEY }}" > .env
          else
            printf "SUPABASE_URL=https://placeholder.supabase.co\nSUPABASE_ANON_KEY=placeholder-anon-key\n" > .env
          fi

      - name: Provision google-services.json
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" ]; then
            echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > android/app/google-services.json
          else
            cat > android/app/google-services.json <<'JSON'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "visionspark-ci-placeholder",
              "storage_bucket": "visionspark-ci-placeholder.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                  "android_client_info": { "package_name": "app.visionspark.app" }
                },
                "oauth_client": [],
                "api_key": [{ "current_key": "AIzaSyPlaceholderPlaceholderPlaceholderPlace" }],
                "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
              }
            ],
            "configuration_version": "1"
          }
          JSON
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: visionspark-debug-apk
          path: visionspark/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 14
