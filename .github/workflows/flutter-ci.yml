name: Flutter CI

on:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FLUTTER_VERSION: 3.32.0

defaults:
  run:
    working-directory: visionspark

jobs:
  analyze:
    name: Analyze and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Direct download avoids the subosito/flutter-action git clone path
      # which has been failing on hosted runners (exit 128).
      - name: Cache Flutter SDK
        id: flutter-cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.tool_cache }}/flutter
          key: flutter-${{ runner.os }}-${{ env.FLUTTER_VERSION }}

      - name: Download Flutter SDK
        if: steps.flutter-cache.outputs.cache-hit != 'true'
        working-directory: ${{ runner.tool_cache }}
        run: |
          curl -fsSL -o flutter.tar.xz \
            "https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_${FLUTTER_VERSION}-stable.tar.xz"
          mkdir -p flutter
          tar -xJf flutter.tar.xz --strip-components=1 -C flutter
          rm flutter.tar.xz

      - name: Add Flutter to PATH
        run: |
          echo "${{ runner.tool_cache }}/flutter/bin" >> "$GITHUB_PATH"
          git config --global --add safe.directory "${{ runner.tool_cache }}/flutter"

      - name: Show Flutter version
        run: flutter --version

      - name: Write .env
        run: |
          if [ -n "${{ secrets.SUPABASE_URL }}" ] && [ -n "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            printf "SUPABASE_URL=%s\nSUPABASE_ANON_KEY=%s\n" \
              "${{ secrets.SUPABASE_URL }}" \
              "${{ secrets.SUPABASE_ANON_KEY }}" > .env
          else
            printf "SUPABASE_URL=https://placeholder.supabase.co\nSUPABASE_ANON_KEY=placeholder-anon-key\n" > .env
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test --no-pub
        continue-on-error: true

  build-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Flutter SDK
        id: flutter-cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.tool_cache }}/flutter
          key: flutter-${{ runner.os }}-${{ env.FLUTTER_VERSION }}

      - name: Download Flutter SDK
        if: steps.flutter-cache.outputs.cache-hit != 'true'
        working-directory: ${{ runner.tool_cache }}
        run: |
          curl -fsSL -o flutter.tar.xz \
            "https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_${FLUTTER_VERSION}-stable.tar.xz"
          mkdir -p flutter
          tar -xJf flutter.tar.xz --strip-components=1 -C flutter
          rm flutter.tar.xz

      - name: Add Flutter to PATH
        run: |
          echo "${{ runner.tool_cache }}/flutter/bin" >> "$GITHUB_PATH"
          git config --global --add safe.directory "${{ runner.tool_cache }}/flutter"

      - name: Write .env
        run: |
          if [ -n "${{ secrets.SUPABASE_URL }}" ] && [ -n "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            printf "SUPABASE_URL=%s\nSUPABASE_ANON_KEY=%s\n" \
              "${{ secrets.SUPABASE_URL }}" \
              "${{ secrets.SUPABASE_ANON_KEY }}" > .env
          else
            printf "SUPABASE_URL=https://placeholder.supabase.co\nSUPABASE_ANON_KEY=placeholder-anon-key\n" > .env
          fi

      - name: Provision google-services.json
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" ]; then
            echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > android/app/google-services.json
          else
            cat > android/app/google-services.json <<'JSON'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "visionspark-ci-placeholder",
              "storage_bucket": "visionspark-ci-placeholder.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                  "android_client_info": { "package_name": "app.visionspark.app" }
                },
                "oauth_client": [],
                "api_key": [{ "current_key": "AIzaSyPlaceholderPlaceholderPlaceholderPlace" }],
                "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
              }
            ],
            "configuration_version": "1"
          }
          JSON
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: visionspark-debug-apk
          path: visionspark/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 14
